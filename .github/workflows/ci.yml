name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. Analyze + Test ────────────────────────────────────────────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  # ─── 2. Build Android APK ────────────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ─── 3. Build iOS (no signing) ───────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --debug

  # ─── 4. Upload to DeployGate ─────────────────────────────────────────────────
  deploy-deploygate:
    name: Upload to DeployGate
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: artifacts/

      - name: Upload to DeployGate
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.DEPLOYGATE_API_KEY }}" \
            -F "file=@artifacts/app-debug.apk" \
            -F "message=Build #${{ github.run_number }} — ${{ github.sha }}" \
            https://deploygate.com/api/users/${{ secrets.DEPLOYGATE_APP_OWNER }}/apps)
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"error":false' && echo "✅ Upload DeployGate thành công!" || (echo "❌ Upload thất bại!" && exit 1)
